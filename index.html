<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthArchive — 점검 중</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:"Pretendard","Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  background:#f5f8f4;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;color:#27322e;
}
.wrap{text-align:center;padding:40px 24px;}
.logo{font-size:28px;font-weight:800;color:#2f6d57;margin-bottom:40px;letter-spacing:0;}
.logo b{color:#27322e;font-weight:400;}
.icon{font-size:56px;margin-bottom:24px;}
h1{font-size:22px;font-weight:700;margin-bottom:14px;color:#27322e;}
p{font-size:15px;color:#6f7872;line-height:1.7;max-width:420px;margin:0 auto;}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#2f6d57;margin:32px 4px 0;
  animation:blink 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2;}40%{opacity:1;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Health<b>Archive</b></div>
  <div class="icon">🔧</div>
  <h1>현재 사이트 점검 중입니다</h1>
  <p>더 나은 서비스 제공을 위해 일시적으로 점검 중입니다.<br>잠시 후 다시 방문해 주세요.</p>
  <div>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>
</div>
</body>
</html>
